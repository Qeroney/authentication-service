spring.application.name=${APP_NAME:auth-service}
server.port=${APP_PORT:8080}
eureka.client.service-url.defaultZone = http://localhost:8761/eureka
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.database=POSTGRESQL
spring.jpa.hibernate.ddl-auto=create
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/postgres?createDatabaseIfNotExists=true}
spring.datasource.username=${DATASOURCE_USERNAME:postgres}
spring.datasource.password=${DATASOURCE_PASSWORD:password}

# Tokens
jwt.secret=${JWT_SECRET:4A614E645267556B58703273357638792F423F4528482B4D6250655368566D59}
jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION:172800000}
jwt.accessExpiration=${JWT_ACCESS_EXPIRATION:1728000}

# Google OAuth 2.0 Configuration
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/api/v1/external/user/google/callback

# Mail Configuration
spring.mail.host=smtp.mail.ru
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8